[zram0]
# linear 2:1 until 16GiB RAM (32GiB zram)
# then fixed 32GiB zram until 64GiB RAM and
# 1:2 after that up to a max of 128GiB zram (no increase after 256GiB RAM)
zram-size=min(max(min(ram * 2, 32 * 1024), ram / 2), 128 * 1024)
# Don't consume more than 3/4 of total RAM
zram-resident-limit=ram * 3/4
compression-algorithm=zstd
swap-priority=32767
